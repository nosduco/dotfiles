# voyager-aspm.conf — apply PCIe ASPM policy at boot.
#
# The `pcie_aspm=` kernel param only accepts off/force. To select among
# default/performance/powersave/powersupersave we have to write the sysfs
# parameter directly, after the pcie_aspm module is initialized. tmpfiles
# runs in systemd-tmpfiles-setup.service early in boot, before userspace.
#
# `powersave` enables L0s + L1. `powersupersave` adds L1.1 + L1.2 (deepest
# substates) but the MT7922 wifi and Kingston KC3000 NVMe both have known
# ASPM-substate quirks — sticking with `powersave`.
w- /sys/module/pcie_aspm/parameters/policy - - - - powersave
