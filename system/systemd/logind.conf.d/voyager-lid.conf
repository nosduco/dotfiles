# voyager-lid.conf — lid-close behavior.
#   On AC: plain s2idle (~0.5 W; quick reopen, no LUKS prompt).
#   On battery: suspend-then-hibernate. After HibernateDelaySec (set in
#     sleep.conf.d/voyager-hibernate.conf) we fall through to disk hibernate
#     so leaving the lid closed overnight doesn't drain the battery.
[Login]
HandleLidSwitch=suspend-then-hibernate
HandleLidSwitchExternalPower=suspend
HandleLidSwitchDocked=ignore
