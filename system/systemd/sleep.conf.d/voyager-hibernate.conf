# voyager-hibernate.conf — suspend-then-hibernate timing.
#   2h s2idle before falling to disk = covers most lunches/meetings without
#   triggering the LUKS resume prompt, but overnight reliably hibernates.
#   This box's s2idle is healthy (~97% s0ix residency, ~0.5 W) so 2h costs ~1 Wh.
[Sleep]
AllowSuspendThenHibernate=yes
HibernateDelaySec=2h
HibernateMode=platform shutdown
