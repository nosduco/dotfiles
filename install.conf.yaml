---
- defaults:
    link:
      relink: true
      force: true
- clean: ["~"]
- shell:
    # Install packages
    - command: ./scripts/install-missing-packages.sh
      description: Installing missing packages from packages.txt
      stdin: true
      stdout: true
      stderr: true
    - command: git -C ~/.tmux/plugins/tpm pull || git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
      description: Installing tmux plugin manager (TPM)
    - command: ~/.tmux/plugins/tpm/bin/install_plugins
      description: Installing tmux plugins
    - command: ya pkg add yazi-rs/flavors:catppuccin-mocha 2>/dev/null || ya pkg upgrade 2>/dev/null || true
      description: Installing yazi catppuccin-mocha flavor
    - command: fish -c "fisher update" 2>/dev/null || true
      description: Installing fish plugins via fisher
    - command: git config --global --get-all include.path | grep -q 'delta/catppuccin.gitconfig' || git config --global --add include.path ~/.dotfiles/delta/catppuccin.gitconfig; git config --global --get-all include.path | grep -q 'delta/config.gitconfig' || git config --global --add include.path ~/.dotfiles/delta/config.gitconfig
      description: Configuring delta with catppuccin theme
    - command: git config --global alias.audit '!~/.dotfiles/scripts/git-audit.sh'
      description: Configuring git audit alias
    - command: mkdir -p ~/.config/systemd/user && ln -sf ~/.dotfiles/systemd/user/yazi-filemanager.service ~/.config/systemd/user/yazi-filemanager.service && systemctl --user daemon-reload && systemctl --user enable --now yazi-filemanager.service 2>/dev/null || true
      description: Enabling yazi FileManager1 D-Bus service
    - command: mkdir -p ~/.config/kopia && [ -f ~/.config/kopia/env ] || install -m 600 ~/.dotfiles/kopia/env.example ~/.config/kopia/env
      description: Seeding ~/.config/kopia/env from example (no-op if it exists)
    - command: systemctl --user enable --now protonmail-bridge.service 2>/dev/null || true
      description: Enabling Proton Mail Bridge user service
    - command: git -C ~/.local/share/catppuccin-thunderbird pull --ff-only --quiet 2>/dev/null || git clone --quiet --depth=1 https://github.com/catppuccin/thunderbird ~/.local/share/catppuccin-thunderbird
      description: Installing/updating Catppuccin Thunderbird theme repo
    # System files with sudo
    - command: sudo ln -sf $(pwd)/greetd/config.toml /etc/greetd/config.toml
      description: Installing greetd config
    - command: sudo mkdir -p /etc/systemd/system/greetd.service.d && sudo ln -sf $(pwd)/greetd/greetd.service.d/* /etc/systemd/system/greetd.service.d/
      description: Installing greetd service override
    - command: sudo cp $(pwd)/system/pam.d/greetd /etc/pam.d/greetd
      description: Installing greetd PAM config with keyring support
    # VPN/WireGuard system files (sudoers must be copied, not symlinked)
    - command: sudo cp $(pwd)/system/sudoers.d/wireguard /etc/sudoers.d/wireguard && sudo chown root:root /etc/sudoers.d/wireguard && sudo chmod 440 /etc/sudoers.d/wireguard
      description: Installing wireguard sudoers config
    - command: sudo cp $(pwd)/system/systemd/vpn-netns.service /etc/systemd/system/vpn-netns.service && sudo systemctl daemon-reload && sudo systemctl enable vpn-netns.service
      description: Installing VPN namespace systemd service
    - command: sudo ln -sf $(pwd)/gamemode/gamemode.ini /etc/gamemode.ini
      description: Installing gamemode config
- link:
    # tty configurations
    ~/.dircolors: .dircolors
    ~/.tmux.conf: .tmux.conf
    ~/.theme.tmux: .theme.tmux
    # Fish (Shell)
    ~/.config/fish:
      create: true
      glob: true
      path: fish
    # Bat (Cat alternative)
    ~/.config/bat:
      create: true
      glob: true
      path: bat
    # Hyprland (WM)
    ~/.config/hypr:
      create: true
      glob: true
      path: hypr
      exclude: [hypr/host.conf, hypr/hypridle.conf, hypr/hyprlock.conf]
    # Dunst (Notifications Daemon)
    ~/.config/dunst:
      create: true
      glob: true
      path: dunst
    # Waybar (Status Bar)
    ~/.config/waybar:
      create: true
      glob: true
      path: waybar
    # wlogout (Logout Menu)
    ~/.config/wlogout:
      create: true
      glob: true
      path: wlogout
    # Cava (Music Visualizer)
    ~/.config/cava:
      create: true
      glob: true
      path: cava
    # Ghostty (terminal emulator)
    ~/.config/ghostty:
      create: true
      glob: true
      path: ghostty
    # Neovim
    ~/.config/nvim/:
      create: true
      glob: true
      path: nvim/*
    # Spicetify (Spotify Theming)
    ~/.config/spicetify/:
      create: true
      glob: true
      path: spicetify/*
    # StreamController (Stream Deck)
    ~/.var/app/com.core447.StreamController/data/:
      create: true
      glob: true
      path: streamcontroller/*
    # Posting (HTTP Client)
    ~/.config/posting/:
      create: true
      glob: true
      path: posting/*
    # Yazi (File Manager)
    ~/.config/yazi/:
      create: true
      glob: true
      path: yazi/*
    # Walker/Elephant (Launcher)
    ~/.config/walker:
      create: true
      glob: true
      path: walker
    ~/.config/elephant:
      create: true
      glob: true
      path: elephant
    ~/.config/btop:
      create: true
      glob: true
      path: btop
    # XDG Desktop Portal
    ~/.config/xdg-desktop-portal:
      create: true
      glob: true
      path: xdg-desktop-portal
    # XDG Desktop Portal - Terminal File Chooser (yazi)
    ~/.config/xdg-desktop-portal-termfilechooser:
      create: true
      glob: true
      path: xdg-desktop-portal-termfilechooser
    # D-Bus overrides (block nautilus FileManager1 activation)
    ~/.local/share/dbus-1/services:
      create: true
      glob: true
      path: dbus-services/*
    # Desktop Applications (Wayland flags)
    ~/.local/share/applications:
      create: true
      glob: true
      path: applications/*
    # VPN scripts
    ~/.local/bin/vpn-up:
      path: scripts/vpn/vpn-up.sh
      create: true
    ~/.local/bin/vpn-down:
      path: scripts/vpn/vpn-down.sh
      create: true
    ~/.local/bin/vpn-toggle:
      path: scripts/vpn/vpn-toggle.sh
      create: true
    ~/.local/bin/vpn-menu:
      path: scripts/vpn/vpn-menu.sh
      create: true
    ~/.local/bin/vpn-status:
      path: scripts/vpn/vpn-status.sh
      create: true
    ~/.local/bin/novpn-exec:
      path: scripts/vpn/novpn-exec.sh
      create: true
    # Nighthawk startup layout script
    ~/.local/bin/nighthawk-layout:
      path: scripts/nighthawk-layout.sh
      create: true

# Nighthawk (Desktop)
- defaults:
    link:
      if: "[ $(hostname) = nighthawk ]"
- link:
    # Audio settings
    ~/.config/wireplumber:
      create: true
      glob: true
      path: wireplumber
    # Hyprland
    ~/.config/hypr/host.conf:
      path: hypr/host/nighthawk.conf
    ~/.config/hypr/hypridle.conf:
      path: hypr/hypridle/nighthawk.conf
    ~/.config/hypr/hyprlock.conf:
      path: hypr/hyprlock/nighthawk.conf
- shell:
    - command: sudo install -m 755 $(pwd)/scripts/dualsense-init.sh /usr/local/bin/dualsense-init
      description: Installing DualSense init script
      if: "[ $(hostname) = nighthawk ]"
    - command: sudo install -m 644 $(pwd)/system/udev/rules.d/99-dualsense.rules /etc/udev/rules.d/99-dualsense.rules && sudo udevadm control --reload-rules && sudo udevadm trigger
      description: Installing DualSense udev rule
      if: "[ $(hostname) = nighthawk ]"
    - command: mkdir -p ~/.config/systemd/user && ln -sf $(pwd)/systemd/user/dualsense-persist.service ~/.config/systemd/user/dualsense-persist.service && ln -sf $(pwd)/systemd/user/dualsense-persist.timer ~/.config/systemd/user/dualsense-persist.timer && systemctl --user daemon-reload && systemctl --user enable --now dualsense-persist.timer
      description: Enabling DualSense persistent-color user timer
      if: "[ $(hostname) = nighthawk ]"
# Voyager (Laptop)
- defaults:
    link:
      if: "[ $(hostname) = voyager ]"
- link:
    # Hyprland
    ~/.config/hypr/host.conf:
      path: hypr/host/voyager.conf
    ~/.config/hypr/hypridle.conf:
      path: hypr/hypridle/voyager.conf
    ~/.config/hypr/hyprlock.conf:
      path: hypr/hyprlock/voyager.conf
